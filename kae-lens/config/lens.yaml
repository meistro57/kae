qdrant:
  host: "localhost"
  port: 6334
  api_key: ""
  knowledge_collection: "kae_knowledge"
  findings_collection: "kae_lens_findings"

watcher:
  poll_interval_seconds: 30
  batch_size: 10
  max_concurrent_batches: 2

density:
  thresholds:
    very_sparse_width: 50
    sparse_width: 35
    medium_width: 20
    dense_width: 12
    very_dense_width: 6
  score_thresholds:
    sparse: 0.60
    dense: 0.80
  density_buckets:
    very_sparse_max: 0
    sparse_max: 10
    medium_max: 50
    dense_max: 200

llm:
  reasoning_model: "deepseek/deepseek-r1"
  fast_model: "google/gemini-flash-1.5"
  openrouter_base_url: "https://openrouter.ai/api/v1"
  openrouter_api_key: ""
  min_confidence: 0.65
  fast_batch_threshold: 5

embedding:
  model: "text-embedding-3-small"
  dimensions: 1536
  openai_api_key: ""

web:
  port: 8080
  sse_path: "/events"
  cors_origin: "*"

tui:
  enabled: true
  refresh_ms: 250
  max_feed_items: 100
