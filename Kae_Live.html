<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAE Live Genealogy - Knowledge Archaeology Engine</title>
  <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    body {
      margin: 0;
      padding: 0;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // Lucide icons as inline SVG components
    const Play = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polygon points="5 3 19 12 5 21 5 3"></polygon>
      </svg>
    );

    const Pause = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <rect x="6" y="4" width="4" height="16"></rect>
        <rect x="14" y="4" width="4" height="16"></rect>
      </svg>
    );

    const RefreshCw = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="23 4 23 10 17 10"></polyline>
        <polyline points="1 20 1 14 7 14"></polyline>
        <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
      </svg>
    );

    const Maximize2 = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <polyline points="15 3 21 3 21 9"></polyline>
        <polyline points="9 21 3 21 3 15"></polyline>
        <line x1="21" y1="3" x2="14" y2="10"></line>
        <line x1="3" y1="21" x2="10" y2="14"></line>
      </svg>
    );

    const ZoomIn = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        <line x1="11" y1="8" x2="11" y2="14"></line>
        <line x1="8" y1="11" x2="14" y2="11"></line>
      </svg>
    );

    const ZoomOut = ({ size = 16 }) => (
      <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2">
        <circle cx="11" cy="11" r="8"></circle>
        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
        <line x1="8" y1="11" x2="14" y2="11"></line>
      </svg>
    );

    const KAELiveGenealogy = () => {
      const [runs, setRuns] = useState([]);
      const [selectedRuns, setSelectedRuns] = useState([]);
      const [nodes, setNodes] = useState([]);
      const [isPolling, setIsPolling] = useState(false);
      const [lastUpdate, setLastUpdate] = useState(null);
      const [zoom, setZoom] = useState(1);
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isDragging, setIsDragging] = useState(false);
      const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
      const [error, setError] = useState(null);
      const [loading, setLoading] = useState(false);
      const svgRef = useRef(null);
      const pollInterval = useRef(null);

      // Fetch available runs from Qdrant via Anthropic API
      const fetchRuns = async () => {
        setLoading(true);
        setError(null);
        try {
          const response = await fetch("https://api.anthropic.com/v1/messages", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({
              model: "claude-sonnet-4-20250514",
              max_tokens: 1000,
              messages: [{
                role: "user",
                content: "Use the kae-qdrant:qdrant_list_runs tool to list all KAE runs. Return the results in a structured format."
              }],
              tools: [
                {
                  name: "kae-qdrant:qdrant_list_runs",
                  description: "List all KAE runs",
                  input_schema: {
                    type: "object",
                    properties: {}
                  }
                }
              ]
            })
          });

          if (!response.ok) {
            throw new Error(`API error: ${response.status}`);
          }

          const data = await response.json();
          
          // Parse tool results
          const toolResults = data.content.filter(b => b.type === "tool_result" || b.type === "mcp_tool_result");
          
          if (toolResults.length > 0) {
            const resultText = toolResults[0].content?.[0]?.text || JSON.stringify(toolResults[0].content);
            
            // Parse run data from markdown format
            const runMatches = resultText.matchAll(/\*\*run_(\d+)\*\*\s+nodes:\s+(\d+)\s+\|\s+anomalies:\s+(\d+)\s+\|\s+max weight:\s+([\d.]+)/g);
            const runsList = Array.from(runMatches).map(m => ({
              id: `run_${m[1]}`,
              nodes: parseInt(m[2]),
              anomalies: parseInt(m[3]),
              maxWeight: parseFloat(m[4]),
              timestamp: parseInt(m[1])
            }));
            
            setRuns(runsList.sort((a, b) => b.timestamp - a.timestamp));
          }
        } catch (err) {
          console.error("Failed to fetch runs:", err);
          setError(`Failed to fetch runs: ${err.message}`);
        } finally {
          setLoading(false);
        }
      };

      // Fetch nodes for selected runs
      const fetchNodes = async () => {
        if (selectedRuns.length === 0) return;

        setLoading(true);
        setError(null);
        const allNodes = [];
        
        for (const runId of selectedRuns) {
          try {
            const response = await fetch("https://api.anthropic.com/v1/messages", {
              method: "POST",
              headers: { "Content-Type": "application/json" },
              body: JSON.stringify({
                model: "claude-sonnet-4-20250514",
                max_tokens: 3000,
                messages: [{
                  role: "user",
                  content: `Use kae-qdrant:qdrant_top_nodes to get the top 50 nodes for run ID "${runId}". Set limit to 50.`
                }],
                tools: [
                  {
                    name: "kae-qdrant:qdrant_top_nodes",
                    description: "Get top nodes",
                    input_schema: {
                      type: "object",
                      properties: {
                        limit: { type: "integer" },
                        run_id: { type: "string" }
                      }
                    }
                  }
                ]
              })
            });

            if (!response.ok) {
              throw new Error(`API error: ${response.status}`);
            }

            const data = await response.json();
            const toolResults = data.content.filter(b => b.type === "tool_result" || b.type === "mcp_tool_result");
            
            if (toolResults.length > 0) {
              const resultText = toolResults[0].content?.[0]?.text || JSON.stringify(toolResults[0].content);
              
              // Parse nodes from markdown format
              const nodeMatches = resultText.matchAll(/\d+\.\s+\*\*(.+?)\*\*(?:\s+⚠)?\s+weight:\s+([\d.]+)\s+\|\s+domain:\s+(\w+)\s+\|\s+cycle:\s+(\d+)/g);
              
              for (const match of nodeMatches) {
                const nodeName = match[1].replace(/\*\*/g, '');
                allNodes.push({
                  name: nodeName,
                  weight: parseFloat(match[2]),
                  domain: match[3],
                  cycle: parseInt(match[4]),
                  runId: runId,
                  isAnomaly: resultText.includes(`**${nodeName}** ⚠`) || resultText.includes(`****${nodeName}****`)
                });
              }
            }
          } catch (err) {
            console.error(`Failed to fetch nodes for ${runId}:`, err);
          }
        }

        setNodes(allNodes);
        setLastUpdate(new Date().toLocaleTimeString());
        setLoading(false);
      };

      // Start/stop polling
      useEffect(() => {
        if (isPolling) {
          pollInterval.current = setInterval(fetchNodes, 5000);
          return () => clearInterval(pollInterval.current);
        } else {
          if (pollInterval.current) clearInterval(pollInterval.current);
        }
      }, [isPolling, selectedRuns]);

      // Initial fetch
      useEffect(() => {
        fetchRuns();
      }, []);

      // Auto-select most recent 3 runs
      useEffect(() => {
        if (runs.length > 0 && selectedRuns.length === 0) {
          setSelectedRuns(runs.slice(0, 3).map(r => r.id));
        }
      }, [runs]);

      // Fetch nodes when selection changes
      useEffect(() => {
        if (selectedRuns.length > 0) {
          fetchNodes();
        }
      }, [selectedRuns]);

      // Calculate graph layout
      const getGraphData = () => {
        if (nodes.length === 0) return { nodes: [], edges: [] };

        // Group by run and cycle
        const runGroups = {};
        nodes.forEach(node => {
          if (!runGroups[node.runId]) runGroups[node.runId] = {};
          if (!runGroups[node.runId][node.cycle]) runGroups[node.runId][node.cycle] = [];
          runGroups[node.runId][node.cycle].push(node);
        });

        // Layout nodes
        const layoutNodes = [];
        const runColors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
        const runIds = Object.keys(runGroups);
        
        runIds.forEach((runId, runIdx) => {
          const cycles = Object.keys(runGroups[runId]).sort((a, b) => parseInt(a) - parseInt(b));
          const runColor = runColors[runIdx % runColors.length];
          
          cycles.forEach((cycle, cycleIdx) => {
            const cycleNodes = runGroups[runId][cycle];
            const x = 100 + cycleIdx * 180;
            const yOffset = runIdx * 150;
            
            cycleNodes.forEach((node, nodeIdx) => {
              layoutNodes.push({
                ...node,
                x,
                y: yOffset + nodeIdx * 40 + 50,
                color: runColor,
                radius: Math.max(5, Math.min(20, node.weight * 3))
              });
            });
          });
        });

        // Create edges (connect nodes in sequence within same run)
        const edges = [];
        runIds.forEach(runId => {
          const runNodes = layoutNodes.filter(n => n.runId === runId).sort((a, b) => a.cycle - b.cycle);
          for (let i = 0; i < runNodes.length - 1; i++) {
            edges.push({
              from: runNodes[i],
              to: runNodes[i + 1],
              color: runNodes[i].color
            });
          }
        });

        return { nodes: layoutNodes, edges };
      };

      const { nodes: graphNodes, edges } = getGraphData();

      // Pan and zoom handlers
      const handleMouseDown = (e) => {
        if (e.button !== 0) return; // Only left click
        setIsDragging(true);
        setDragStart({ x: e.clientX - pan.x, y: e.clientY - pan.y });
      };

      const handleMouseMove = (e) => {
        if (isDragging) {
          setPan({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
        }
      };

      const handleMouseUp = () => {
        setIsDragging(false);
      };

      const handleWheel = (e) => {
        e.preventDefault();
        const delta = e.deltaY > 0 ? 0.9 : 1.1;
        setZoom(prev => Math.max(0.1, Math.min(3, prev * delta)));
      };

      return (
        <div className="w-full h-screen bg-gray-950 text-gray-100 flex flex-col">
          {/* Header */}
          <div className="p-4 border-b border-gray-800 flex items-center justify-between">
            <div>
              <h1 className="text-2xl font-bold text-blue-400">KAE Live Genealogy</h1>
              <p className="text-sm text-gray-400 mt-1">
                {selectedRuns.length} runs • {nodes.length} concepts
                {lastUpdate && ` • Updated ${lastUpdate}`}
                {loading && <span className="ml-2 text-yellow-400">⟳ Loading...</span>}
              </p>
              {error && <p className="text-sm text-red-400 mt-1">⚠ {error}</p>}
            </div>
            
            <div className="flex gap-2">
              <button
                onClick={() => setIsPolling(!isPolling)}
                className={`px-4 py-2 rounded flex items-center gap-2 ${
                  isPolling ? 'bg-red-600 hover:bg-red-700' : 'bg-green-600 hover:bg-green-700'
                }`}
              >
                {isPolling ? <Pause size={16} /> : <Play size={16} />}
                {isPolling ? 'Pause' : 'Start'} Live Updates
              </button>
              
              <button
                onClick={fetchNodes}
                disabled={loading}
                className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded flex items-center gap-2 disabled:opacity-50"
              >
                <RefreshCw size={16} />
                Refresh
              </button>

              <button
                onClick={() => { setZoom(1); setPan({ x: 0, y: 0 }); }}
                className="px-4 py-2 bg-gray-700 hover:bg-gray-600 rounded flex items-center gap-2"
              >
                <Maximize2 size={16} />
                Reset View
              </button>

              <button
                onClick={() => setZoom(prev => Math.min(3, prev * 1.2))}
                className="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded"
              >
                <ZoomIn size={16} />
              </button>

              <button
                onClick={() => setZoom(prev => Math.max(0.1, prev * 0.8))}
                className="px-3 py-2 bg-gray-700 hover:bg-gray-600 rounded"
              >
                <ZoomOut size={16} />
              </button>
            </div>
          </div>

          {/* Run Selector */}
          <div className="p-4 border-b border-gray-800">
            <div className="flex flex-wrap gap-2">
              {runs.slice(0, 10).map(run => (
                <button
                  key={run.id}
                  onClick={() => {
                    setSelectedRuns(prev =>
                      prev.includes(run.id)
                        ? prev.filter(id => id !== run.id)
                        : [...prev, run.id]
                    );
                  }}
                  className={`px-3 py-1 rounded text-sm ${
                    selectedRuns.includes(run.id)
                      ? 'bg-blue-600 text-white'
                      : 'bg-gray-800 text-gray-300 hover:bg-gray-700'
                  }`}
                >
                  {run.id} ({run.nodes}n, {run.anomalies}a)
                </button>
              ))}
            </div>
          </div>

          {/* Graph Canvas */}
          <div className="flex-1 relative overflow-hidden">
            <svg
              ref={svgRef}
              className="w-full h-full cursor-move"
              onMouseDown={handleMouseDown}
              onMouseMove={handleMouseMove}
              onMouseUp={handleMouseUp}
              onMouseLeave={handleMouseUp}
              onWheel={handleWheel}
            >
              <g transform={`translate(${pan.x}, ${pan.y}) scale(${zoom})`}>
                {/* Edges */}
                {edges.map((edge, idx) => (
                  <line
                    key={`edge-${idx}`}
                    x1={edge.from.x}
                    y1={edge.from.y}
                    x2={edge.to.x}
                    y2={edge.to.y}
                    stroke={edge.color}
                    strokeWidth="1"
                    opacity="0.3"
                  />
                ))}

                {/* Nodes */}
                {graphNodes.map((node, idx) => (
                  <g key={`node-${idx}`}>
                    <circle
                      cx={node.x}
                      cy={node.y}
                      r={node.radius}
                      fill={node.color}
                      stroke={node.isAnomaly ? '#fbbf24' : 'none'}
                      strokeWidth={node.isAnomaly ? 2 : 0}
                      opacity="0.8"
                    >
                      <title>{node.name} (weight: {node.weight}, cycle: {node.cycle})</title>
                    </circle>
                    <text
                      x={node.x + node.radius + 5}
                      y={node.y + 4}
                      fontSize="10"
                      fill="#e5e7eb"
                      className="pointer-events-none"
                    >
                      {node.name.length > 40 ? node.name.slice(0, 40) + '...' : node.name}
                    </text>
                  </g>
                ))}
              </g>
            </svg>

            {/* Legend */}
            <div className="absolute bottom-4 right-4 bg-gray-900 border border-gray-700 rounded p-3 text-sm">
              <div className="font-bold mb-2">Legend</div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-4 h-4 rounded-full border-2 border-yellow-400"></div>
                <span>Anomaly</span>
              </div>
              <div className="flex items-center gap-2 mb-1">
                <div className="w-4 h-4 rounded-full bg-blue-500"></div>
                <span>Node (size = weight)</span>
              </div>
              <div className="text-xs text-gray-500 mt-2">
                Drag to pan • Scroll to zoom
              </div>
            </div>

            {/* Info Panel */}
            {graphNodes.length === 0 && !loading && (
              <div className="absolute inset-0 flex items-center justify-center">
                <div className="text-center text-gray-400">
                  <p className="text-lg mb-2">No data to display</p>
                  <p className="text-sm">Select runs above and click Refresh</p>
                </div>
              </div>
            )}
          </div>
        </div>
      );
    };

    ReactDOM.render(<KAELiveGenealogy />, document.getElementById('root'));
  </script>
</body>
</html>
