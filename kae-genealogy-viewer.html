<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KAE Live Genealogy - Knowledge Archaeology Engine</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0f;
      color: #e5e7eb;
      overflow: hidden;
    }
    
    #header {
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 1rem;
    }
    
    h1 {
      color: #60a5fa;
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
    }
    
    #stats {
      font-size: 0.875rem;
      color: #9ca3af;
    }
    
    .status {
      display: inline-block;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      margin-right: 0.5rem;
    }
    
    .status.live { background: #10b981; box-shadow: 0 0 8px #10b981; animation: pulse 2s infinite; }
    .status.stale { background: #f59e0b; }
    
    @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    
    #controls {
      background: #111827;
      border-bottom: 1px solid #1f2937;
      padding: 1rem;
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      align-items: center;
    }
    
    button {
      background: #374151;
      color: #e5e7eb;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 0.375rem;
      cursor: pointer;
      font-size: 0.875rem;
      transition: background 0.2s;
    }
    
    button:hover { background: #4b5563; }
    button.active { background: #2563eb; }
    
    select {
      background: #374151;
      color: #e5e7eb;
      border: 1px solid #4b5563;
      padding: 0.5rem;
      border-radius: 0.375rem;
      font-size: 0.875rem;
    }
    
    #canvas-container {
      position: relative;
      flex: 1;
      overflow: hidden;
    }
    
    #canvas {
      display: block;
      cursor: grab;
    }
    
    #canvas:active { cursor: grabbing; }
    
    #legend {
      position: absolute;
      bottom: 1rem;
      right: 1rem;
      background: #111827;
      border: 1px solid #374151;
      border-radius: 0.5rem;
      padding: 1rem;
      font-size: 0.875rem;
    }
    
    .legend-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.5rem;
    }
    
    .legend-color {
      width: 1rem;
      height: 1rem;
      border-radius: 50%;
    }
    
    .legend-border { border: 2px solid #fbbf24; }
    
    #tooltip {
      position: absolute;
      background: #1f2937;
      border: 1px solid #374151;
      border-radius: 0.375rem;
      padding: 0.5rem;
      font-size: 0.75rem;
      pointer-events: none;
      display: none;
      z-index: 1000;
      max-width: 300px;
    }
    
    .container {
      display: flex;
      flex-direction: column;
      height: 100vh;
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="header">
      <h1>
        <span class="status stale" id="connection-status"></span>
        KAE Live Genealogy
      </h1>
      <div id="stats">Loading kae_data.json...</div>
    </div>
    
    <div id="controls">
      <label style="color: #9ca3af; margin-right: 0.5rem;">Filter by seed:</label>
      <select id="seed-filter" onchange="filterBySeed()">
        <option value="">All Seeds</option>
      </select>
      <div style="flex: 1;"></div>
      <div id="run-buttons"></div>
      <button onclick="resetView()">Reset View</button>
      <button onclick="zoomIn()">Zoom +</button>
      <button onclick="zoomOut()">Zoom −</button>
    </div>
    
    <div id="canvas-container">
      <canvas id="canvas"></canvas>
      <div id="tooltip"></div>
      <div id="legend">
        <div class="legend-item">
          <div class="legend-color legend-border" style="background: #3b82f6;"></div>
          <span>Anomaly</span>
        </div>
        <div class="legend-item">
          <div class="legend-color" style="background: #3b82f6;"></div>
          <span>Concept (size = weight)</span>
        </div>
        <div style="margin-top: 0.5rem; color: #6b7280; font-size: 0.75rem;">
          Drag to pan • Scroll to zoom
        </div>
      </div>
    </div>
  </div>

  <script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const tooltip = document.getElementById('tooltip');
    const statusIndicator = document.getElementById('connection-status');
    const statsDiv = document.getElementById('stats');
    const seedFilter = document.getElementById('seed-filter');
    
    let allData = null;
    let selectedRuns = new Set();
    let currentSeed = '';
    let zoom = 1;
    let pan = { x: 50, y: 50 };
    let isDragging = false;
    let dragStart = { x: 0, y: 0 };
    
    const colors = ['#3b82f6', '#10b981', '#f59e0b', '#ef4444', '#8b5cf6', '#ec4899'];
    
    async function loadData() {
      try {
        const response = await fetch('kae_data.json?' + Date.now());
        if (!response.ok) throw new Error('File not found');
        
        const data = await response.json();
        allData = data;
        
        // Update seed filter
        if (data.seeds && data.seeds.length > 0) {
          const current = seedFilter.value;
          seedFilter.innerHTML = '<option value="">All Seeds</option>';
          data.seeds.forEach(seed => {
            const opt = document.createElement('option');
            opt.value = seed;
            opt.textContent = seed.charAt(0).toUpperCase() + seed.slice(1);
            if (seed === current) opt.selected = true;
            seedFilter.appendChild(opt);
          });
        }
        
        filterBySeed();
        statusIndicator.className = 'status live';
        
      } catch (err) {
        console.error('Load error:', err);
        statsDiv.textContent = 'Error: kae_data.json not found. Run: python kae_live_parser.py --once';
        statusIndicator.className = 'status stale';
      }
    }
    
    function filterBySeed() {
      currentSeed = seedFilter.value;
      
      if (!allData) return;
      
      const filteredRuns = currentSeed 
        ? allData.runs.filter(r => r.seed === currentSeed)
        : allData.runs;
      
      // Auto-select up to 3 runs
      selectedRuns.clear();
      filteredRuns.slice(-3).forEach(r => selectedRuns.add(r.id));
      
      updateRunButtons(filteredRuns);
      updateStats();
      render();
    }
    
    function updateRunButtons(runs) {
      const container = document.getElementById('run-buttons');
      container.innerHTML = '';
      
      runs.forEach((run, idx) => {
        const btn = document.createElement('button');
        btn.textContent = `${run.name} (${run.nodes}n, ${run.anomalies}a)`;
        btn.className = selectedRuns.has(run.id) ? 'active' : '';
        if (selectedRuns.has(run.id)) {
          btn.style.background = colors[idx % colors.length];
        }
        btn.onclick = () => toggleRun(run.id);
        container.appendChild(btn);
      });
    }
    
    function toggleRun(runId) {
      if (selectedRuns.has(runId)) {
        selectedRuns.delete(runId);
      } else {
        selectedRuns.add(runId);
      }
      
      const filteredRuns = currentSeed 
        ? allData.runs.filter(r => r.seed === currentSeed)
        : allData.runs;
      updateRunButtons(filteredRuns);
      updateStats();
      render();
    }
    
    function getFilteredNodes() {
      if (!allData) return [];
      return allData.nodes.filter(n => selectedRuns.has(n.runId));
    }
    
    function updateStats() {
      if (!allData) return;
      
      const nodes = getFilteredNodes();
      const anomalies = nodes.filter(n => n.isAnomaly).length;
      const updateTime = new Date(allData.timestamp).toLocaleTimeString();
      
      statsDiv.textContent = `${allData.total_runs} total runs • ${selectedRuns.size} selected • ${nodes.length} concepts • ${anomalies} anomalies • Updated ${updateTime}`;
    }
    
    function layoutGraph() {
      const nodes = getFilteredNodes();
      const runIds = Array.from(selectedRuns);
      const runGroups = {};
      
      nodes.forEach(node => {
        if (!runGroups[node.runId]) runGroups[node.runId] = {};
        if (!runGroups[node.runId][node.cycle]) runGroups[node.runId][node.cycle] = [];
        runGroups[node.runId][node.cycle].push(node);
      });
      
      const layoutNodes = [];
      const edges = [];
      
      runIds.forEach((runId, runIdx) => {
        const cycles = Object.keys(runGroups[runId] || {}).sort((a, b) => a - b);
        const color = colors[runIdx % colors.length];
        let prevNode = null;
        
        cycles.forEach((cycle, cycleIdx) => {
          const cycleNodes = runGroups[runId][cycle];
          const x = 100 + cycleIdx * 200;
          const yOffset = runIdx * 150;
          
          cycleNodes.forEach((node, nodeIdx) => {
            const layoutNode = {
              ...node,
              x,
              y: yOffset + nodeIdx * 50 + 100,
              color,
              radius: Math.max(6, Math.min(25, node.weight * 3))
            };
            layoutNodes.push(layoutNode);
            
            if (prevNode && prevNode.cycle < node.cycle) {
              edges.push({ from: prevNode, to: layoutNode, color });
            }
            prevNode = layoutNode;
          });
        });
      });
      
      return { nodes: layoutNodes, edges };
    }
    
    function render() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.save();
      ctx.translate(pan.x, pan.y);
      ctx.scale(zoom, zoom);
      
      const { nodes, edges } = layoutGraph();
      
      edges.forEach(edge => {
        ctx.strokeStyle = edge.color + '33';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(edge.from.x, edge.from.y);
        ctx.lineTo(edge.to.x, edge.to.y);
        ctx.stroke();
      });
      
      nodes.forEach(node => {
        ctx.fillStyle = node.color;
        ctx.globalAlpha = 0.8;
        ctx.beginPath();
        ctx.arc(node.x, node.y, node.radius, 0, Math.PI * 2);
        ctx.fill();
        
        if (node.isAnomaly) {
          ctx.strokeStyle = '#fbbf24';
          ctx.lineWidth = 2.5;
          ctx.stroke();
        }
        
        ctx.globalAlpha = 1;
        ctx.fillStyle = '#e5e7eb';
        ctx.font = '11px sans-serif';
        const label = node.name.length > 35 ? node.name.slice(0, 35) + '...' : node.name;
        ctx.fillText(label, node.x + node.radius + 8, node.y + 4);
      });
      
      ctx.restore();
    }
    
    function resizeCanvas() {
      const container = document.getElementById('canvas-container');
      canvas.width = container.clientWidth;
      canvas.height = container.clientHeight;
      render();
    }
    
    function screenToCanvas(screenX, screenY) {
      return {
        x: (screenX - pan.x) / zoom,
        y: (screenY - pan.y) / zoom
      };
    }
    
    function findNodeAtPoint(x, y) {
      const { nodes } = layoutGraph();
      const canvasPoint = screenToCanvas(x, y);
      
      for (let i = nodes.length - 1; i >= 0; i--) {
        const node = nodes[i];
        const dx = canvasPoint.x - node.x;
        const dy = canvasPoint.y - node.y;
        if (Math.sqrt(dx * dx + dy * dy) <= node.radius) {
          return node;
        }
      }
      return null;
    }
    
    canvas.addEventListener('mousedown', (e) => {
      isDragging = true;
      dragStart = { x: e.clientX - pan.x, y: e.clientY - pan.y };
    });
    
    canvas.addEventListener('mousemove', (e) => {
      if (isDragging) {
        pan.x = e.clientX - dragStart.x;
        pan.y = e.clientY - dragStart.y;
        render();
      }
      
      const node = findNodeAtPoint(e.clientX, e.clientY);
      if (node) {
        tooltip.style.display = 'block';
        tooltip.style.left = e.clientX + 15 + 'px';
        tooltip.style.top = e.clientY + 15 + 'px';
        tooltip.innerHTML = `
          <strong>${node.name}</strong><br>
          Weight: ${node.weight}<br>
          Cycle: ${node.cycle}<br>
          ${node.isAnomaly ? '<span style="color: #fbbf24;">⚠ Anomaly</span>' : ''}
        `;
      } else {
        tooltip.style.display = 'none';
      }
    });
    
    canvas.addEventListener('mouseup', () => { isDragging = false; });
    canvas.addEventListener('mouseleave', () => { isDragging = false; tooltip.style.display = 'none'; });
    
    canvas.addEventListener('wheel', (e) => {
      e.preventDefault();
      const delta = e.deltaY > 0 ? 0.9 : 1.1;
      zoom = Math.max(0.1, Math.min(3, zoom * delta));
      render();
    });
    
    function resetView() {
      zoom = 1;
      pan = { x: 50, y: 50 };
      render();
    }
    
    function zoomIn() {
      zoom = Math.min(3, zoom * 1.2);
      render();
    }
    
    function zoomOut() {
      zoom = Math.max(0.1, zoom / 1.2);
      render();
    }
    
    // Initialize
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();
    
    // Load data every 3 seconds
    loadData();
    setInterval(loadData, 3000);
  </script>
</body>
</html>
