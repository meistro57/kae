name: CI

on:
  push:
    branches:
      - "**"
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify formatting
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "The following files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      # Root module
      - name: Vet (root)
        run: go vet ./...

      - name: Test (root)
        run: go test ./...

      # kae-lens module
      - name: Vet (kae-lens)
        working-directory: kae-lens
        run: go vet ./...

      - name: Test (kae-lens)
        working-directory: kae-lens
        run: go test ./...

      # mcp module
      - name: Vet (mcp)
        working-directory: mcp
        run: go vet ./...

      - name: Build (mcp)
        working-directory: mcp
        run: go build ./...

      # kae-analyzer module
      - name: Vet (kae-analyzer)
        working-directory: kae-analyzer
        run: go vet ./...

      - name: Build (kae-analyzer)
        working-directory: kae-analyzer
        run: go build ./...
